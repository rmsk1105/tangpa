<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>낙원 / 증명 트래커</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #5b7fff;
      --accent2: #a78bfa;
      --gold: #f0b429;
      --green: #34d399;
      --red: #f87171;
      --text: #e2e8f0;
      --text-dim: #8892a4;
      --radius: 12px;
      --panel-w: 550px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
    }

    .layout { display: flex; min-height: 100vh; }

    .side-panel {
      width: var(--panel-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }
    .side-panel img {
      width: 100%; flex: 1;
      object-fit: cover; object-position: center center;
      display: block;
    }
    .side-panel img:first-child { border-bottom: 1px solid var(--border); }

    .center { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text p  { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .week-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .week-badge strong { color: var(--accent); }

    main { max-width: 860px; width: 100%; margin: 0 auto; padding: 32px 20px; }

    /* ── Add bar ── */
    .add-bar { display: flex; gap: 10px; margin-bottom: 16px; }
    .add-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px; color: var(--text);
      outline: none; transition: border-color .2s;
    }
    .add-bar input:focus { border-color: var(--accent); }
    .add-bar input::placeholder { color: var(--text-dim); }

    /* ── Toolbar (선택 삭제 등) ── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      min-height: 38px;
    }
    .select-count {
      font-size: 13px; color: var(--text-dim);
      margin-right: auto;
    }
    .select-count strong { color: var(--text); }

    /* ── Buttons ── */
    .btn {
      background: var(--accent);
      color: #fff; border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      white-space: nowrap;
    }
    .btn:hover  { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn.danger {
      background: #2d1414;
      border: 1px solid #5a2020;
      color: var(--red);
    }
    .btn.migrate {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent2);
      font-size: 12px;
      padding: 8px 14px;
    }

    /* ── Stats ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px; text-align: center;
    }
    .stat-card .val { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-card .lbl { font-size: 12px; color: var(--text-dim); }
    .stat-card.paradise .val { color: var(--gold); }
    .stat-card.proof    .val { color: var(--accent2); }
    .stat-card.total    .val { color: var(--green); }

    /* ── Section header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-header h2 {
      font-size: 15px; font-weight: 600;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px;
    }

    /* ── Char cards ── */
    .char-list { display: flex; flex-direction: column; gap: 10px; }

    .char-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 28px 1fr auto auto;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
      cursor: default;
    }
    .char-card:hover { border-color: #3d4460; }
    .char-card.selected { border-color: var(--accent); background: #1a2040; }

    /* 선택 체크박스 */
    .sel-check {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all .15s;
      flex-shrink: 0;
    }
    .char-card.selected .sel-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .char-name { font-size: 15px; font-weight: 600; }

    .check-group { display: flex; align-items: center; gap: 14px; }

    .check-item {
      display: flex; align-items: center;
      cursor: pointer; user-select: none;
    }
    .check-item input[type=checkbox] { display: none; }
    .check-box {
      width: 78px; height: 34px;
      border-radius: 8px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 5px;
      font-size: 13px; font-weight: 600;
      color: var(--text-dim);
      background: var(--surface2);
      transition: all .2s;
    }
    .check-item input:checked ~ .check-box { border-color: transparent; color: #fff; }
    .check-item.paradise input:checked ~ .check-box {
      background: linear-gradient(135deg, #b45309, #f0b429);
      box-shadow: 0 0 10px rgba(240,180,41,.3);
    }
    .check-item.proof input:checked ~ .check-box {
      background: linear-gradient(135deg, #5b21b6, #a78bfa);
      box-shadow: 0 0 10px rgba(167,139,250,.3);
    }

    .date-input-wrap { display: flex; flex-direction: column; gap: 3px; }
    .date-input-wrap label { font-size: 11px; color: var(--text-dim); }
    .date-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px; color: var(--text-dim);
      width: 172px; height: 30px;
      display: flex; align-items: center;
      letter-spacing: 0.3px;
    }
    .date-display.filled { color: var(--text); border-color: var(--accent); }

    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all .2s;
    }
    .icon-btn:hover { border-color: var(--red); color: var(--red); background: #1e1212; }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
    .empty p { font-size: 14px; }

    /* 로딩 */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(15,17,23,.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; font-size: 15px; color: var(--text-dim); gap: 12px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .reset-info {
      margin-top: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 13px; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .reset-info span { color: var(--accent2); font-weight: 600; }

    @media (max-width: 900px) { .side-panel { display: none; } }
    @media (max-width: 600px) {
      .char-card { grid-template-columns: 28px 1fr; }
      .check-group { flex-wrap: wrap; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div> <span id="loadingMsg">불러오는 중...</span>
</div>

<div class="layout">
  <div class="side-panel">
    <img src="left_top.png"    alt="" />
    <img src="left_bottom.png" alt="" />
  </div>

  <div class="center">
    <header>
      <div class="logo">
        <div class="logo-icon">🌟</div>
        <div class="logo-text">
          <h1>낙원 / 증명 트래커</h1>
          <p>주간 숙제 완료 현황</p>
        </div>
      </div>
      <div class="week-badge">
        🗓 <strong id="weekLabel"></strong>
        <span id="resetCountdown"></span>
      </div>
    </header>

    <main>
      <!-- 추가 바 -->
      <div class="add-bar">
        <input id="charInput" type="text" placeholder="캐릭터명 입력 후 Enter 또는 추가 클릭" maxlength="20" />
        <button class="btn" id="addBtn" onclick="addChar()">+ 추가</button>
        <button class="btn migrate" onclick="migrateLocal()" title="이 컴퓨터 localStorage에 저장된 캐릭터를 서버로 가져옵니다">📦 로컬 데이터 가져오기</button>
      </div>

      <!-- 툴바 -->
      <div class="toolbar">
        <button class="btn secondary" onclick="toggleSelectAll()" id="selectAllBtn">전체 선택</button>
        <button class="btn danger" id="deleteSelectedBtn" onclick="deleteSelected()" style="display:none">🗑 선택 삭제 (<span id="selCount">0</span>)</button>
        <button class="btn secondary" onclick="resetAll()">이번 주 초기화</button>
        <span class="select-count" id="selectCountMsg"></span>
      </div>

      <!-- 통계 -->
      <div class="stats-bar">
        <div class="stat-card paradise">
          <div class="val" id="statParadise">0 / 0</div>
          <div class="lbl">🌅 낙원 완료</div>
        </div>
        <div class="stat-card proof">
          <div class="val" id="statProof">0 / 0</div>
          <div class="lbl">⚔️ 증명 완료</div>
        </div>
        <div class="stat-card total">
          <div class="val" id="statTotal">0%</div>
          <div class="lbl">전체 달성률</div>
        </div>
      </div>

      <div class="section-header">
        <h2>캐릭터 목록</h2>
      </div>
      <div class="char-list" id="charList"></div>

      <div class="reset-info">
        🔄 매주 <span>수요일 06:00</span>에 낙원 / 증명 완료 상태가 자동으로 초기화됩니다. 캐릭터 목록과 날짜는 유지됩니다.
      </div>
    </main>
  </div>

  <div class="side-panel">
    <img src="right_top.png"    alt="" />
    <img src="right_bottom.png" alt="" />
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://igaewgwcrsfsazjnrvzr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnYWV3Z3djcnNmc2F6am5ydnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDM3OTAsImV4cCI6MjA5Njc3OTc5MH0.18qij0QtZwoPxsK9velEjEAOrMEzsPIg5aYi8xJ77j8';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── 주차 키 ──
  function getWeekKey() {
    const kst = new Date(Date.now() + 9 * 3600000);
    const day = kst.getUTCDay(), h = kst.getUTCHours();
    const diff = (day - 3 + 7) % 7;
    const anchor = new Date(kst);
    anchor.setUTCDate(kst.getUTCDate() - diff);
    if (day === 3 && h < 6) anchor.setUTCDate(anchor.getUTCDate() - 7);
    return `${anchor.getUTCFullYear()}_${anchor.getUTCMonth()+1}_${anchor.getUTCDate()}`;
  }

  function getWeekRange() {
    const kst = new Date(Date.now() + 9 * 3600000);
    const day = kst.getUTCDay(), h = kst.getUTCHours();
    const diff = (day - 3 + 7) % 7;
    const wed = new Date(kst);
    wed.setUTCDate(kst.getUTCDate() - diff);
    if (day === 3 && h < 6) wed.setUTCDate(wed.getUTCDate() - 7);
    const nextWed = new Date(wed);
    nextWed.setUTCDate(wed.getUTCDate() + 7);
    const fmt = d => `${d.getUTCMonth()+1}/${d.getUTCDate()}`;
    return { start: fmt(wed), end: fmt(nextWed), nextWed };
  }

  function todayStr() {
    const days = ['일','월','화','수','목','금','토'];
    const n = new Date();
    return `${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')}.(${days[n.getDay()]})`;
  }

  // ── 상태 ──
  let chars = [];
  let checks = {};
  let selected = new Set();

  // ── 데이터 로드 ──
  async function loadAll() {
    showLoading(true, '불러오는 중...');
    const wk = getWeekKey();
    const [{ data: cData }, { data: wData }] = await Promise.all([
      sb.from('characters').select('name').order('id'),
      sb.from('weekly_checks').select('*').eq('week_key', wk)
    ]);
    chars = (cData || []).map(r => r.name);
    checks = {};
    (wData || []).forEach(r => { checks[r.character_name] = r; });
    // 선택 목록에서 없어진 캐릭터 제거
    selected = new Set([...selected].filter(n => chars.includes(n)));
    render();
    showLoading(false);
  }

  // ── 렌더 ──
  function render() {
    const el = document.getElementById('charList');
    if (chars.length === 0) {
      el.innerHTML = `<div class="empty"><div class="icon">🗺️</div><p>캐릭터를 추가해 주세요</p></div>`;
      updateStats(0, 0, 0);
      updateSelUI();
      return;
    }
    let pDone = 0, qDone = 0;
    el.innerHTML = chars.map((name) => {
      const row = checks[name] || {};
      const pChecked = row.paradise || false;
      const qChecked = row.proof    || false;
      const dateVal  = row.completed_date || '';
      if (pChecked) pDone++;
      if (qChecked) qDone++;
      const isSel = selected.has(name);
      return `
      <div class="char-card${isSel ? ' selected' : ''}" id="card_${escId(name)}">
        <div class="sel-check" onclick="toggleSelect('${escJs(name)}')">${isSel ? '✓' : ''}</div>
        <div class="char-name">${escHtml(name)}</div>
        <div class="check-group">
          <label class="check-item paradise">
            <input type="checkbox" ${pChecked ? 'checked' : ''} onchange="toggle('${escJs(name)}','paradise',this.checked)" />
            <div class="check-box">🌅 낙원</div>
          </label>
          <label class="check-item proof">
            <input type="checkbox" ${qChecked ? 'checked' : ''} onchange="toggle('${escJs(name)}','proof',this.checked)" />
            <div class="check-box">⚔️ 증명</div>
          </label>
          <div class="date-input-wrap">
            <label>완료 일자</label>
            <div class="date-display ${dateVal ? 'filled' : ''}">${dateVal || '—'}</div>
          </div>
        </div>
        <button class="icon-btn" title="삭제" onclick="removeSingle('${escJs(name)}')">✕</button>
      </div>`;
    }).join('');
    updateStats(pDone, qDone, chars.length);
    updateSelUI();
  }

  function updateStats(pDone, qDone, total) {
    document.getElementById('statParadise').textContent = `${pDone} / ${total}`;
    document.getElementById('statProof').textContent    = `${qDone} / ${total}`;
    const pct = total === 0 ? 0 : Math.round((pDone + qDone) / (total * 2) * 100);
    document.getElementById('statTotal').textContent = `${pct}%`;
  }

  function updateSelUI() {
    const cnt = selected.size;
    const delBtn = document.getElementById('deleteSelectedBtn');
    const allBtn = document.getElementById('selectAllBtn');
    document.getElementById('selCount').textContent = cnt;
    delBtn.style.display = cnt > 0 ? '' : 'none';
    const allSelected = chars.length > 0 && chars.every(n => selected.has(n));
    allBtn.textContent = allSelected ? '전체 해제' : '전체 선택';
  }

  // ── 선택 토글 ──
  function toggleSelect(name) {
    if (selected.has(name)) selected.delete(name);
    else selected.add(name);
    render();
  }

  function toggleSelectAll() {
    const allSelected = chars.length > 0 && chars.every(n => selected.has(n));
    if (allSelected) selected.clear();
    else chars.forEach(n => selected.add(n));
    render();
  }

  // ── 선택 삭제 ──
  async function deleteSelected() {
    if (selected.size === 0) return;
    if (!confirm(`선택한 ${selected.size}개 캐릭터를 삭제할까요?`)) return;
    showLoading(true, '삭제 중...');
    const names = [...selected];
    await Promise.all([
      sb.from('characters').delete().in('name', names),
      sb.from('weekly_checks').delete().in('character_name', names)
    ]);
    selected.clear();
    await loadAll();
  }

  // ── 단일 삭제 ──
  async function removeSingle(name) {
    if (!confirm(`"${name}" 캐릭터를 삭제할까요?`)) return;
    showLoading(true, '삭제 중...');
    await Promise.all([
      sb.from('characters').delete().eq('name', name),
      sb.from('weekly_checks').delete().eq('character_name', name)
    ]);
    selected.delete(name);
    await loadAll();
  }

  // ── 추가 ──
  async function addChar() {
    const input = document.getElementById('charInput');
    const name  = input.value.trim();
    if (!name) return;
    if (chars.includes(name)) { alert('이미 추가된 캐릭터입니다.'); return; }
    document.getElementById('addBtn').disabled = true;
    const { error } = await sb.from('characters').insert({ name });
    document.getElementById('addBtn').disabled = false;
    if (error) { alert('오류: ' + error.message); return; }
    input.value = '';
    await loadAll();
  }

  // ── 체크 토글 ──
  async function toggle(name, type, val) {
    const wk  = getWeekKey();
    const row = checks[name] || {};
    const newP = type === 'paradise' ? val : (row.paradise || false);
    const newQ = type === 'proof'    ? val : (row.proof    || false);
    const newDate = (newP && newQ) ? todayStr() : null;
    await sb.from('weekly_checks').upsert({
      character_name: name, week_key: wk,
      paradise: newP, proof: newQ, completed_date: newDate
    }, { onConflict: 'character_name,week_key' });
    await loadAll();
  }

  // ── 주간 초기화 ──
  async function resetAll() {
    if (!confirm('이번 주 완료 기록을 모두 초기화할까요?')) return;
    showLoading(true, '초기화 중...');
    await sb.from('weekly_checks').delete().eq('week_key', getWeekKey());
    await loadAll();
  }

  // ── 로컬 데이터 마이그레이션 ──
  async function migrateLocal() {
    const localChars = (() => {
      try { return JSON.parse(localStorage.getItem('loa_paradise_chars')) || []; }
      catch { return []; }
    })();
    if (localChars.length === 0) {
      alert('이 컴퓨터에 저장된 로컬 데이터가 없습니다.'); return;
    }
    if (!confirm(`로컬에 저장된 캐릭터 ${localChars.length}명을 서버로 가져올까요?\n(중복은 자동으로 건너뜁니다)\n\n${localChars.join(', ')}`)) return;
    showLoading(true, '마이그레이션 중...');
    for (const name of localChars) {
      await sb.from('characters').upsert({ name }, { onConflict: 'name', ignoreDuplicates: true });
    }
    await loadAll();
    alert(`완료! ${localChars.length}명 가져왔습니다.`);
  }

  // ── 헤더 ──
  function updateHeader() {
    const { start, end, nextWed } = getWeekRange();
    document.getElementById('weekLabel').textContent = `${start} ~ ${end}`;
    const diff = nextWed.getTime() - 9*3600000 + 6*3600000 - Date.now();
    if (diff > 0) {
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      document.getElementById('resetCountdown').textContent =
        `· 초기화까지 ${d > 0 ? d+'일 ' : ''}${h}시간 ${m}분`;
    }
  }

  function showLoading(v, msg) {
    document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none';
    if (msg) document.getElementById('loadingMsg').textContent = msg;
  }

  document.getElementById('charInput').addEventListener('keydown', e => { if (e.key === 'Enter') addChar(); });

  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const escJs   = s => s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const escId   = s => s.replace(/[^a-zA-Z0-9가-힣]/g,'_');

  updateHeader();
  setInterval(updateHeader, 60000);
  loadAll();
</script>
</body>
</html>
